<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience Replay DQN Visualization</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Experience Replay DQN</h1>
            <p>Training a Deep Q-Network on a dynamic Gridworld environment.</p>
        </header>

        <main>
            <section class="controls-panel card">
                <h2>Configuration</h2>
                <div class="control-group">
                    <label for="width">Grid Width (X):</label>
                    <input type="number" id="width" value="4" min="4" max="10">
                </div>
                <div class="control-group">
                    <label for="height">Grid Height (Y):</label>
                    <input type="number" id="height" value="4" min="4" max="10">
                </div>
                <div class="control-group">
                    <label for="epochs">Epochs:</label>
                    <input type="number" id="epochs" value="1000" min="100" max="5000" step="100">
                </div>
                <button id="train-btn" class="primary-btn">Start Training</button>
            </section>

            <div class="main-content">
                <section class="grid-panel card">
                    <div class="panel-header">
                        <h2>Gridworld Simulation</h2>
                        <span id="simulation-status" class="status badge">Awaiting Training...</span>
                    </div>
                    <div id="grid-container" class="grid-container">
                        <!-- Grid cells generated by JS -->
                    </div>
                    <div class="legend">
                        <div class="legend-item"><span class="cell player"></span> Player</div>
                        <div class="legend-item"><span class="cell goal"></span> Goal</div>
                        <div class="legend-item"><span class="cell pit"></span> Pit</div>
                        <div class="legend-item"><span class="cell wall"></span> Wall</div>
                    </div>
                </section>

                <section class="chart-panel card">
                    <h2>Training Loss</h2>
                    <div class="chart-container">
                        <canvas id="lossChart"></canvas>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
