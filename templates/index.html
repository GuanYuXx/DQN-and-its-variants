<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Experience Replay DQN Visualization</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Experience Replay DQN</h1>
            <p>Training a Deep Q-Network on a dynamic Gridworld environment.</p>
        </header>

        <main>
            <section class="controls-panel card">
                <h2>Configuration</h2>
                <div class="control-group">
                    <label for="width">Grid Width (X):</label>
                    <input type="number" id="width" value="4" min="4" max="10">
                </div>
                <div class="control-group">
                    <label for="height">Grid Height (Y):</label>
                    <input type="number" id="height" value="4" min="4" max="10">
                </div>
                <div class="control-group">
                    <label for="epochs">Epochs:</label>
                    <input type="number" id="epochs" value="500" min="100" max="5000" step="100">
                </div>
                <div class="control-actions" style="display: flex; gap: 1rem; align-items: flex-end; margin-top: 1.2rem;">
                    <button id="randomize-btn" class="secondary-btn" style="margin-top: 0;">🎲 Randomize Positions</button>
                    <button id="train-btn" class="primary-btn" style="margin-top: 0;">Start Training</button>
                </div>
            </section>

            <div class="main-content">
                <section class="grid-panel card">
                    <div class="panel-header">
                        <h2>Sampled Memory Routes</h2>
                    </div>
                    <div class="route-selectors" id="route-selectors">
                        <p class="placeholder-text">Routes will appear here after training.</p>
                        <!-- Checkboxes injected by JS -->
                    </div>
                    
                    <div id="grid-container-wrapper" style="position: relative; width: fit-content; margin: 0 auto;">
                        <div id="grid-container" class="grid-container">
                            <!-- Grid cells generated by JS -->
                        </div>
                        <svg id="route-svg" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 20;"></svg>
                    </div>
                    
                    <div class="legend">
                        <div class="legend-item"><span class="cell player"></span> Player</div>
                        <div class="legend-item"><span class="cell goal"></span> Goal</div>
                        <div class="legend-item"><span class="cell pit"></span> Pit</div>
                        <div class="legend-item"><span class="cell wall"></span> Wall</div>
                    </div>
                </section>

                <section class="chart-panel card">
                    <div class="panel-header">
                        <h2>Training Loss</h2>
                        <span id="training-status" class="status badge">Awaiting Training...</span>
                    </div>
                    <div class="chart-container">
                        <canvas id="lossChart"></canvas>
                    </div>
                </section>
            </div>
            
            <div class="bottom-content" style="margin-top: 2rem;">
                <section class="replay-panel card">
                    <div class="panel-header">
                        <h2>Final Agent Animation Replay</h2>
                        <span id="replay-status" class="status badge">Awaiting Training...</span>
                    </div>
                    
                    <div class="replay-controls" style="text-align: center; margin-bottom: 1.5rem;">
                        <button id="replay-btn" class="secondary-btn" disabled>▶ Play Animation</button>
                    </div>
                    
                    <div id="replay-grid-container" class="grid-container">
                        <!-- Replay grid cells generated by JS -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
